services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: foghorn
      POSTGRES_PASSWORD: foghorn
      POSTGRES_DB: foghorn
    volumes:
      - foghorn_pgdata:/var/lib/postgresql/data
    networks:
      - foghorn_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foghorn -d foghorn"]
      interval: 5s
      timeout: 5s
      retries: 12

  probe:
    build:
      context: .
      dockerfile: Dockerfile
      target: probe
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FOGHORN__DATABASE_URL: "postgres://foghorn:foghorn@db:5432/foghorn"
      RUST_LOG: "foghorn_probe=info,reqwest=warn"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./test-sets:/app/test-sets:ro
    working_dir: /app
    networks:
      - foghorn_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      FOGHORN__DATABASE_URL: "postgres://foghorn:foghorn@db:5432/foghorn"
      FOGHORN__API_PORT: "8080"
      FOGHORN__API_HOST: "0.0.0.0"
      RUST_LOG: "foghorn_api=info,tower_http=info"
    working_dir: /app
    networks:
      - foghorn_net

volumes:
  foghorn_pgdata:

networks:
  foghorn_net:
    driver: bridge
